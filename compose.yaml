services:
  wxcloud-server:
    build:
      context: .
    container_name: wxcloud-server
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:${PORT:-8080}/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: wxcloud-server-caddy
    restart: unless-stopped
    depends_on:
      wxcloud-server:
        condition: service_healthy
    environment:
      DOMAIN: "${DOMAIN}"
      PORT: "${PORT:-8080}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
